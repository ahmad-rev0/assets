<svg width="700" height="120" viewBox="0 0 700 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Drop shadow filter for the text -->
    <filter id="text-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="black" flood-opacity="0.5" />
    </filter>
  </defs>

  <style>
    .text {
      font-family: "Times New Roman", Georgia, serif;
      font-style: italic;
      font-size: 28px;
      fill: #F5F5F5;
      /* Thin black outline */
      stroke: black;
      stroke-width: 0.7;
      stroke-linecap: round;
      stroke-linejoin: round;
      paint-order: stroke fill;
      /* Drop shadow */
      filter: url(#text-shadow);
    }
    .cursor {
      fill: #F5F5F5;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>

  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Line 1 -->
  <text x="50%" y="50%" text-anchor="middle" class="text">
    <tspan opacity="0">
      CS Student📍Hong Kong
      <animate attributeName="opacity"
        values="1;1;0;0;0;0;0;0"
        dur="12s"
        repeatCount="indefinite"/>
    </tspan>
  </text>

  <!-- Line 2 -->
  <text x="50%" y="50%" text-anchor="middle" class="text">
    <tspan opacity="0">
      Exploring Robotics and AI Systems
      <animate attributeName="opacity"
        values="0;0;1;1;0;0;0;0"
        dur="12s"
        repeatCount="indefinite"/>
    </tspan>
  </text>

  <!-- Line 3 -->
  <text x="50%" y="50%" text-anchor="middle" class="text">
    <tspan opacity="0">
      Piling up the stack and developing!
      <animate attributeName="opacity"
        values="0;0;0;0;1;1;0;0"
        dur="12s"
        repeatCount="indefinite"/>
    </tspan>
  </text>

  <!-- Line 4 -->
  <text x="50%" y="50%" text-anchor="middle" class="text">
    <tspan opacity="0">
      Always Learning
      <animate attributeName="opacity"
        values="0;0;0;0;0;0;1;1"
        dur="12s"
        repeatCount="indefinite"/>
    </tspan>
  </text>

  <!-- Cursor -->
  <text x="87%" y="50%" class="cursor" font-size="28px">|</text>
</svg>
